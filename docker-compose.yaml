services:
  web:
    build: .
    container_name: fruittrees
    restart: unless-stopped
    networks:
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.fruittrees.rule=Host(`fruittrees.arlint.dev`)"
      - "traefik.http.routers.fruittrees.service=fruittrees"
      - "traefik.http.services.fruittrees.loadbalancer.server.port=80"

networks:
  traefik-proxy:
    external: true
